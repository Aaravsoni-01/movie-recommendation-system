version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/movies.db
    restart: always

volumes:
  sqlite_data:
